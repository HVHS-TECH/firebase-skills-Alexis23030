<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Firebase Basics</title>
  <link rel="icon" type="image/x-icon" href="assets/images/dtec_favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />

  <!-- firebase start ****************************************-->
  <!-- Firebase App (core Firebase SDK) is always required & must be listed 1st -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
  <!-- Add Firebase products that you want to use -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
  <!-- firebase end ******************************************-->
  <script src="fb_setup.js"></script>
  <script src="fb_io.js"></script>

</head>

<body>

  <h2>Firebase Skills</h2>
  <p>All of the Firebase Skills</p>
  <button class="button" onclick="simpleWrite()">Basic Write</button>
  <button class="button" onclick="simpleRead()">Basic Read</button>
  <button class="button" onclick="readListener()">Read listener</button><br>
  <button class="button" onclick="complexWrite()">Complex Write</button>
  <button class="button" onclick="updateWrite('Alexis', 0)">Update Highscore</button>
  <button class="button" onclick="complexRead()">Complex Read</button><br>
  <button class="button" onclick="sortedRead()">Sorted Read</button>
  <button class="button" onclick="fb_login()">Login With Google</button><br>

  <h2>Output</h2>
  <div id="databaseOutput"></div>

  <h2>User:</h2>
  <div id="userInfo"></div>

  <script src="script.js"></script>

</body>

</html>
